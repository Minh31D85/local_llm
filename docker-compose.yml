version: "3.9"

services:
  ai_code:
    build: .
    container_name: ai_code
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env
    depends_on:
      - ollama
    networks:
      - postgres_network

  ollama:
    image: ollama/ollama
    container_name: ai_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - postgres_network

volumes:
  ollama_data:

networks:
  postgres_network:
    external: true
